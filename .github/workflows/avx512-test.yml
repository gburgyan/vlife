name: AVX-512 Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Test with AVX-512 code path using SIMDE emulation (portable, works on any CPU)
  test-avx512-simde:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ libtbb-dev qtbase5-dev

      - name: Configure with AVX-512 via SIMDE
        run: |
          mkdir build
          cd build
          # ENABLE_AVX512=ON uses SIMDE for portable emulation
          # AVX512_NATIVE=OFF (default) ensures no native AVX-512 instructions
          cmake -DENABLE_AVX512=ON -DCMAKE_BUILD_TYPE=Release ..

      - name: Build
        run: |
          cd build
          make -j$(nproc)

      - name: Run unit tests
        run: |
          cd build
          ctest --output-on-failure

      - name: Run quick benchmark
        run: |
          cd build
          ./VLifeBenchmark --quick || echo "Quick benchmark completed"

  # Test without AVX-512 to ensure scalar/NEON paths work
  test-scalar:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ libtbb-dev qtbase5-dev

      - name: Configure without AVX-512
        run: |
          mkdir build
          cd build
          cmake -DENABLE_AVX512=OFF -DCMAKE_BUILD_TYPE=Release ..

      - name: Build
        run: |
          cd build
          make -j$(nproc)

      - name: Run unit tests
        run: |
          cd build
          ctest --output-on-failure
